<!DOCTYPE html>

<head>

    <title>Cubos Girando | Background Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, -apple-system, 'Inter', sans-serif;
        }

        /* Canvas para os cubos girando */
        #canvas-cubes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: none;
        }

        /* Container central para a frase com traços */
        .hero {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            width: 100%;
            max-width: 95vw;
            pointer-events: none;
        }

        /* Linha superior - cobrindo toda a largura da palavra */
        .line-above {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffffff 5%, #ffffff 95%, transparent);
            margin: 0 auto 28px auto;
            border-radius: 3px;
            box-shadow: 0 0 12px rgba(255,255,255,0.6);
        }

        /* Frase principal - CAIXA ALTA */
        .main-phrase {
            color: white;
            font-size: clamp(1.8rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            background: transparent;
            padding: 0 20px;
            display: inline-block;
            font-family: 'Segoe UI', 'Inter', 'Montserrat', system-ui, sans-serif;
            white-space: nowrap;
            text-transform: uppercase;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 560px) {
            .main-phrase {
                white-space: normal;
                word-break: keep-all;
                font-size: clamp(1.4rem, 7vw, 2.4rem);
                letter-spacing: 2px;
                display: block;
                padding: 0 16px;
            }
        }

        /* Linha inferior - cobrindo toda a largura da palavra */
        .line-below {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffffff 5%, #ffffff 95%, transparent);
            margin: 28px auto 0 auto;
            border-radius: 3px;
            box-shadow: 0 0 12px rgba(255,255,255,0.6);
        }

        /* Animação suave de entrada */
        .hero {
            animation: fadeInUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>

    <canvas id="canvas-cubes"></canvas>

    <div class="hero">
        <div class="line-above"></div>
        <div class="main-phrase">BACKGROUND ANIMATION</div>
        <div class="line-below"></div>
    </div>

    <script>
        (function() {
            // ======================== CUBOS GIRANDO QUE SURGEM DE BAIXO ========================
            const canvas = document.getElementById('canvas-cubes');
            const ctx = canvas.getContext('2d');
           
            let cubes = [];
            let canvasWidth, canvasHeight;
           
            // Configurações da animação
            const MAX_CUBES = 80;
            const GENERATION_RATE = 0.45;      // Taxa de geração por frame (ajustado com delta)
            const CUBE_SIZE_MIN = 22;
            const CUBE_SIZE_MAX = 55;
           
            const SPEED_MIN = 40;               // pixels por segundo (subindo)
            const SPEED_MAX = 110;              
           
            // Velocidade de rotação (graus por segundo)
            const ROTATION_SPEED_MIN = 45;      // graus/segundo
            const ROTATION_SPEED_MAX = 180;    
           
            // Movimento horizontal suave
            const HORIZONTAL_SPEED_MIN = 12;
            const HORIZONTAL_SPEED_MAX = 40;
           
            // Paleta de tons de cinza
            const GRAY_COLORS = [
                '#7A7A7A', '#8A8A8A', '#929292', '#9E9E9E', '#868686',
                '#707070', '#989898', '#A4A4A4', '#808080', '#6E6E6E',
                '#949494', '#A0A0A0', '#888888', '#787878', '#9C9C9C',
                '#7E7E7E', '#8E8E8E', '#969696', '#A2A2A2', '#848484',
                '#747474', '#909090', '#9A9A9A', '#A6A6A6'
            ];
           
            // === CLASSE CUBO COM ROTAÇÃO CONTÍNUA ===
            class RotatingCube {
                constructor(x, y, size, speedY, speedX, rotationSpeed) {
                    this.x = x;                     // centro X
                    this.y = y;                     // centro Y
                    this.size = size;               // tamanho da aresta
                    this.speedY = speedY;           // velocidade vertical (px/s)
                    this.speedX = speedX;           // velocidade horizontal (px/s)
                    this.rotationSpeed = rotationSpeed; // velocidade de rotação (graus/s)
                    this.currentAngle = Math.random() * 360; // ângulo inicial aleatório
                    this.directionX = Math.random() > 0.5 ? 1 : -1;
                   
                    // Cor do cubo
                    this.mainColor = GRAY_COLORS[Math.floor(Math.random() * GRAY_COLORS.length)];
                    this.lightIntensity = 0.3 + Math.random() * 0.5;
                    this.opacity = 0.9 + Math.random() * 0.2;
                    this.currentOpacity = this.opacity;
                }
               
                // Desenha o cubo (quadrado) rotacionado dinamicamente
                render(ctx) {
                    if (this.currentOpacity <= 0.02) return;
                   
                    ctx.save();
                    ctx.globalAlpha = this.currentOpacity;
                   
                    // Sombra para dar profundidade
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;
                   
                    // Translada para o centro do cubo e rotaciona
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.currentAngle * Math.PI / 180);
                   
                    // Desenha o quadrado (cubo em 2D rotacionado)
                    const halfSize = this.size / 2;
                   
                    // Gradiente para efeito 3D
                    const gradient = ctx.createLinearGradient(-halfSize, -halfSize, halfSize, halfSize);
                    gradient.addColorStop(0, this.mainColor);
                    gradient.addColorStop(0.5, this.adjustBrightness(this.mainColor, -8));
                    gradient.addColorStop(1, this.adjustBrightness(this.mainColor, -22));
                    ctx.fillStyle = gradient;
                   
                    // Desenha o quadrado
                    ctx.fillRect(-halfSize, -halfSize, this.size, this.size);
                   
                    // Contorno brilhante
                    ctx.strokeStyle = `rgba(200, 200, 200, 0.5)`;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(-halfSize, -halfSize, this.size, this.size);
                   
                    // Efeito de brilho interno (quadrado menor)
                    const innerSize = this.size * 0.55;
                    const innerHalf = innerSize / 2;
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.12 * this.lightIntensity})`;
                    ctx.fillRect(-innerHalf, -innerHalf, innerSize, innerSize);
                   
                    // Linhas diagonais para dar sensação de cubo 3D
                    ctx.beginPath();
                    ctx.moveTo(-halfSize * 0.6, -halfSize * 0.6);
                    ctx.lineTo(halfSize * 0.6, halfSize * 0.6);
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.2)`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                   
                    ctx.beginPath();
                    ctx.moveTo(halfSize * 0.6, -halfSize * 0.6);
                    ctx.lineTo(-halfSize * 0.6, halfSize * 0.6);
                    ctx.stroke();
                   
                    ctx.restore();
                }
               
                adjustBrightness(hex, percent) {
                    let r, g, b;
                    if (hex.startsWith('#')) {
                        r = parseInt(hex.slice(1, 3), 16);
                        g = parseInt(hex.slice(3, 5), 16);
                        b = parseInt(hex.slice(5, 7), 16);
                    } else {
                        return hex;
                    }
                   
                    r = Math.min(255, Math.max(0, r + (r * percent) / 100));
                    g = Math.min(255, Math.max(0, g + (g * percent) / 100));
                    b = Math.min(255, Math.max(0, b + (b * percent) / 100));
                   
                    return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
                }
               
                update(deltaSec, canvasWidth, canvasHeight) {
                    // Atualiza rotação
                    this.currentAngle += this.rotationSpeed * deltaSec;
                    if (this.currentAngle >= 360) this.currentAngle -= 360;
                   
                    // Movimento vertical (sobe)
                    this.y -= this.speedY * deltaSec;
                   
                    // Movimento horizontal
                    this.x += this.speedX * this.directionX * deltaSec;
                   
                    // Wrap-around horizontal (cubos que saem pelas laterais reaparecem do outro lado)
                    const halfSize = this.size / 2;
                    if (this.x + halfSize < -50) {
                        this.x = canvasWidth + halfSize;
                    } else if (this.x - halfSize > canvasWidth + 50) {
                        this.x = -halfSize;
                    }
                   
                    // Cálculo do fade out baseado na posição Y (desaparece suavemente ao chegar no topo)
                    let fadeFactor = 1;
                    const topFadeStart = canvasHeight * 0.18;  // começa a desaparecer nos 18% superiores
                    const topFadeEnd = -this.size;
                   
                    if (this.y <= topFadeStart && this.y > topFadeEnd) {
                        const t = (this.y - topFadeEnd) / (topFadeStart - topFadeEnd);
                        fadeFactor = Math.min(1, Math.max(0, t));
                    } else if (this.y <= topFadeEnd) {
                        fadeFactor = 0;
                    }
                   
                    this.currentOpacity = Math.min(1, Math.max(0, this.opacity * fadeFactor));
                   
                    // Remove se saiu completamente do topo ou opacidade zerada
                    if (this.y + this.size < -this.size) return false;
                    if (this.currentOpacity <= 0.02) return false;
                   
                    return true;
                }
            }
           
            // Geração de novo cubo - SURGINDO EXCLUSIVAMENTE DE BAIXO
            function generateCubeFromBottom() {
                // Margem para não nascer colado nas bordas laterais
                const margin = Math.max(30, CUBE_SIZE_MAX);
                let x = Math.random() * (canvasWidth - margin * 2) + margin;
               
                // Garantir que não ultrapasse os limites
                x = Math.min(Math.max(x, margin), canvasWidth - margin);
               
                // Y: surge EXATAMENTE da parte inferior ou levemente abaixo da tela
                // para dar efeito de "surgir de baixo"
                let y = canvasHeight + (Math.random() * 25) - 5;
                // Garantir que sempre comece na parte inferior visível ou um pouco abaixo
                y = Math.max(y, canvasHeight - 8);
               
                const size = Math.floor(Math.random() * (CUBE_SIZE_MAX - CUBE_SIZE_MIN + 1) + CUBE_SIZE_MIN);
                const speedY = Math.random() * (SPEED_MAX - SPEED_MIN) + SPEED_MIN;
                const speedX = Math.random() * (HORIZONTAL_SPEED_MAX - HORIZONTAL_SPEED_MIN) + HORIZONTAL_SPEED_MIN;
                const rotationSpeed = Math.random() * (ROTATION_SPEED_MAX - ROTATION_SPEED_MIN) + ROTATION_SPEED_MIN;
               
                return new RotatingCube(x, y, size, speedY, speedX, rotationSpeed);
            }
           
            // Redimensiona o canvas
            function resizeCanvas() {
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
            }
           
            // Atualiza todos os cubos
            function updateCubes(deltaSec) {
                const safeDelta = Math.min(deltaSec, 0.033);
               
                // Atualiza posições e remove os mortos
                for (let i = cubes.length - 1; i >= 0; i--) {
                    const cube = cubes[i];
                    const alive = cube.update(safeDelta, canvasWidth, canvasHeight);
                    if (!alive) {
                        cubes.splice(i, 1);
                    }
                }
               
                // Geração de novos cubos - surgem de baixo continuamente
                if (cubes.length < MAX_CUBES) {
                    // Taxa de spawn ajustada pelo delta time para manter consistência entre FPS
                    let spawnChance = GENERATION_RATE * (safeDelta * 60);
                    spawnChance = Math.min(0.9, spawnChance);
                   
                    if (Math.random() < spawnChance && cubes.length < MAX_CUBES) {
                        cubes.push(generateCubeFromBottom());
                        // Ocasionalmente gera dois cubos para fluxo mais intenso
                        if (Math.random() < 0.2 && cubes.length < MAX_CUBES - 1) {
                            cubes.push(generateCubeFromBottom());
                        }
                    }
                }
               
                // Garantir que sempre tenha cubos subindo (se estiver muito vazio)
                if (cubes.length < 22 && Math.random() < 0.4 * (safeDelta * 60)) {
                    if (cubes.length < MAX_CUBES) {
                        cubes.push(generateCubeFromBottom());
                        if (Math.random() < 0.5 && cubes.length < MAX_CUBES) {
                            cubes.push(generateCubeFromBottom());
                        }
                    }
                }
            }
           
            // Renderiza todos os cubos
            function renderCubes() {
                if (!ctx) return;
                // Fundo preto total
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
               
                // Pequeno efeito de profundidade: renderiza todos
                for (let cube of cubes) {
                    cube.render(ctx);
                }
            }
           
            // Loop de animação
            let previousTimestamp = performance.now();
           
            function animateFrame(nowMs) {
                requestAnimationFrame(animateFrame);
                const now = performance.now();
                let delta = Math.min(0.033, (now - previousTimestamp) / 1000);
                if (delta <= 0.001) {
                    previousTimestamp = now;
                    return;
                }
                previousTimestamp = now;
               
                updateCubes(delta);
                renderCubes();
            }
           
            // Tratamento de redimensionamento
            function handleResize() {
                resizeCanvas();
                // Ajusta posições dos cubos existentes para não ficarem fora
                for (let i = 0; i < cubes.length; i++) {
                    const c = cubes[i];
                    const halfSize = c.size / 2;
                    // Se o cubo estiver muito fora horizontalmente, reposiciona na borda oposta
                    if (c.x + halfSize < -100) {
                        c.x = canvasWidth + halfSize;
                    } else if (c.x - halfSize > canvasWidth + 100) {
                        c.x = -halfSize;
                    }
                    // Garante que não fique em posição inválida verticalmente
                    if (c.y + c.size < -200) {
                        cubes.splice(i, 1);
                        i--;
                    }
                }
                renderCubes();
            }
           
            // Inicialização com cubos surgindo de baixo
            function initCubes(count = 35) {
                cubes = [];
                for (let i = 0; i < count; i++) {
                    // Todos os cubos iniciais surgem da parte inferior
                    const margin = 40;
                    let x = Math.random() * (canvasWidth - margin * 2) + margin;
                    let y = canvasHeight - Math.random() * 60 + 10;
                    y = Math.min(canvasHeight + 15, Math.max(canvasHeight - 25, y));
                    let size = Math.floor(Math.random() * (CUBE_SIZE_MAX - CUBE_SIZE_MIN) + CUBE_SIZE_MIN);
                    let speedY = Math.random() * (SPEED_MAX - SPEED_MIN) + SPEED_MIN;
                    let speedX = Math.random() * (HORIZONTAL_SPEED_MAX - HORIZONTAL_SPEED_MIN) + HORIZONTAL_SPEED_MIN;
                    let rotationSpeed = Math.random() * (ROTATION_SPEED_MAX - ROTATION_SPEED_MIN) + ROTATION_SPEED_MIN;
                    let cube = new RotatingCube(x, y, size, speedY, speedX, rotationSpeed);
                    cubes.push(cube);
                }
            }
           
            // Inicia tudo
            function startAnimation() {
                resizeCanvas();
                initCubes(40);
                window.addEventListener('resize', handleResize);
                previousTimestamp = performance.now();
                requestAnimationFrame(animateFrame);
            }
           
            startAnimation();
        })();
    </script>
</body>

                        return hex;
                    }
                   
                    r = Math.min(255, Math.max(0, r + (r * percent) / 100));
                    g = Math.min(255, Math.max(0, g + (g * percent) / 100));
                    b = Math.min(255, Math.max(0, b + (b * percent) / 100));
                   
                    return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
                }
               
                update(deltaSec, canvasWidth, canvasHeight) {
                    // Atualiza rotação
                    this.currentAngle += this.rotationSpeed * deltaSec;
                    if (this.currentAngle >= 360) this.currentAngle -= 360;
                   
                    // Movimento vertical (sobe)
                    this.y -= this.speedY * deltaSec;
                   
                    // Movimento horizontal
                    this.x += this.speedX * this.directionX * deltaSec;
                   
                    // Wrap-around horizontal (cubos que saem pelas laterais reaparecem do outro lado)
                    const halfSize = this.size / 2;
                    if (this.x + halfSize < -50) {
                        this.x = canvasWidth + halfSize;
                    } else if (this.x - halfSize > canvasWidth + 50) {
                        this.x = -halfSize;
                    }
                   
                    // Cálculo do fade out baseado na posição Y (desaparece suavemente ao chegar no topo)
                    let fadeFactor = 1;
                    const topFadeStart = canvasHeight * 0.18;  // começa a desaparecer nos 18% superiores
                    const topFadeEnd = -this.size;
                   
                    if (this.y <= topFadeStart && this.y > topFadeEnd) {
                        const t = (this.y - topFadeEnd) / (topFadeStart - topFadeEnd);
                        fadeFactor = Math.min(1, Math.max(0, t));
                    } else if (this.y <= topFadeEnd) {
                        fadeFactor = 0;
                    }
                   
                    this.currentOpacity = Math.min(1, Math.max(0, this.opacity * fadeFactor));
                   
                    // Remove se saiu completamente do topo ou opacidade zerada
                    if (this.y + this.size < -this.size) return false;
                    if (this.currentOpacity <= 0.02) return false;
                   
                    return true;
                }
            }
           
            // Geração de novo cubo - SURGINDO EXCLUSIVAMENTE DE BAIXO
            function generateCubeFromBottom() {
                // Margem para não nascer colado nas bordas laterais
                const margin = Math.max(30, CUBE_SIZE_MAX);
                let x = Math.random() * (canvasWidth - margin * 2) + margin;
               
                // Garantir que não ultrapasse os limites
                x = Math.min(Math.max(x, margin), canvasWidth - margin);
               
                // Y: surge EXATAMENTE da parte inferior ou levemente abaixo da tela
                // para dar efeito de "surgir de baixo"
                let y = canvasHeight + (Math.random() * 25) - 5;
                // Garantir que sempre comece na parte inferior visível ou um pouco abaixo
                y = Math.max(y, canvasHeight - 8);
               
                const size = Math.floor(Math.random() * (CUBE_SIZE_MAX - CUBE_SIZE_MIN + 1) + CUBE_SIZE_MIN);
                const speedY = Math.random() * (SPEED_MAX - SPEED_MIN) + SPEED_MIN;
                const speedX = Math.random() * (HORIZONTAL_SPEED_MAX - HORIZONTAL_SPEED_MIN) + HORIZONTAL_SPEED_MIN;
                const rotationSpeed = Math.random() * (ROTATION_SPEED_MAX - ROTATION_SPEED_MIN) + ROTATION_SPEED_MIN;
               
                return new RotatingCube(x, y, size, speedY, speedX, rotationSpeed);
            }
           
            // Redimensiona o canvas
            function resizeCanvas() {
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
            }
           
            // Atualiza todos os cubos
            function updateCubes(deltaSec) {
                const safeDelta = Math.min(deltaSec, 0.033);
               
                // Atualiza posições e remove os mortos
                for (let i = cubes.length - 1; i >= 0; i--) {
                    const cube = cubes[i];
                    const alive = cube.update(safeDelta, canvasWidth, canvasHeight);
                    if (!alive) {
                        cubes.splice(i, 1);
                    }
                }
               
                // Geração de novos cubos - surgem de baixo continuamente
                if (cubes.length < MAX_CUBES) {
                    // Taxa de spawn ajustada pelo delta time para manter consistência entre FPS
                    let spawnChance = GENERATION_RATE * (safeDelta * 60);
                    spawnChance = Math.min(0.9, spawnChance);
                   
                    if (Math.random() < spawnChance && cubes.length < MAX_CUBES) {
                        cubes.push(generateCubeFromBottom());
                        // Ocasionalmente gera dois cubos para fluxo mais intenso
                        if (Math.random() < 0.2 && cubes.length < MAX_CUBES - 1) {
                            cubes.push(generateCubeFromBottom());
                        }
                    }
                }
               
                // Garantir que sempre tenha cubos subindo (se estiver muito vazio)
                if (cubes.length < 22 && Math.random() < 0.4 * (safeDelta * 60)) {
                    if (cubes.length < MAX_CUBES) {
                        cubes.push(generateCubeFromBottom());
                        if (Math.random() < 0.5 && cubes.length < MAX_CUBES) {
                            cubes.push(generateCubeFromBottom());
                        }
                    }
                }
            }
           
            // Renderiza todos os cubos
            function renderCubes() {
                if (!ctx) return;
                // Fundo preto total
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
               
                // Pequeno efeito de profundidade: renderiza todos
                for (let cube of cubes) {
                    cube.render(ctx);
                }
            }
           
            // Loop de animação
            let previousTimestamp = performance.now();
           
            function animateFrame(nowMs) {
                requestAnimationFrame(animateFrame);
                const now = performance.now();
                let delta = Math.min(0.033, (now - previousTimestamp) / 1000);
                if (delta <= 0.001) {
                    previousTimestamp = now;
                    return;
                }
                previousTimestamp = now;
               
                updateCubes(delta);
                renderCubes();
            }
           
            // Tratamento de redimensionamento
            function handleResize() {
                resizeCanvas();
                // Ajusta posições dos cubos existentes para não ficarem fora
                for (let i = 0; i < cubes.length; i++) {
                    const c = cubes[i];
                    const halfSize = c.size / 2;
                    // Se o cubo estiver muito fora horizontalmente, reposiciona na borda oposta
                    if (c.x + halfSize < -100) {
                        c.x = canvasWidth + halfSize;
                    } else if (c.x - halfSize > canvasWidth + 100) {
                        c.x = -halfSize;
                    }
                    // Garante que não fique em posição inválida verticalmente
                    if (c.y + c.size < -200) {
                        cubes.splice(i, 1);
                        i--;
                    }
                }
                renderCubes();
            }
           
            // Inicialização com cubos surgindo de baixo
            function initCubes(count = 35) {
                cubes = [];
                for (let i = 0; i < count; i++) {
                    // Todos os cubos iniciais surgem da parte inferior
                    const margin = 40;
                    let x = Math.random() * (canvasWidth - margin * 2) + margin;
                    let y = canvasHeight - Math.random() * 60 + 10;
                    y = Math.min(canvasHeight + 15, Math.max(canvasHeight - 25, y));
                    let size = Math.floor(Math.random() * (CUBE_SIZE_MAX - CUBE_SIZE_MIN) + CUBE_SIZE_MIN);
                    let speedY = Math.random() * (SPEED_MAX - SPEED_MIN) + SPEED_MIN;
                    let speedX = Math.random() * (HORIZONTAL_SPEED_MAX - HORIZONTAL_SPEED_MIN) + HORIZONTAL_SPEED_MIN;
                    let rotationSpeed = Math.random() * (ROTATION_SPEED_MAX - ROTATION_SPEED_MIN) + ROTATION_SPEED_MIN;
                    let cube = new RotatingCube(x, y, size, speedY, speedX, rotationSpeed);
                    cubes.push(cube);
                }
            }
           
            // Inicia tudo
            function startAnimation() {
                resizeCanvas();
                initCubes(40);
                window.addEventListener('resize', handleResize);
                previousTimestamp = performance.now();
                requestAnimationFrame(animateFrame);
            }
           
            startAnimation();
        })();
    </script>
</body>
</html>
